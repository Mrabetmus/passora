<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Passora — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050810;
      --surface: #0c1120;
      --card: #111827;
      --border: rgba(255,255,255,0.07);
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --gold: #f59e0b;
      --text: #f1f5f9;
      --muted: #64748b;
      --green: #10b981;
      --red: #ef4444;
      --sidebar-w: 260px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 50;
    }

    .sidebar-logo {
      padding: 0 24px 28px;
      border-bottom: 1px solid var(--border);
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sidebar-logo span {
      background: linear-gradient(135deg, #f59e0b, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sidebar-nav {
      padding: 20px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.04);
      color: var(--text);
    }

    .nav-item.active {
      background: rgba(59,130,246,0.12);
      color: var(--accent);
    }

    .nav-item .icon { font-size: 1.1rem; width: 20px; text-align: center; }

    .sidebar-bottom {
      padding: 20px 12px;
      border-top: 1px solid var(--border);
    }

    .business-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
    }

    .business-avatar {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
    }

    .business-name {
      font-size: 0.85rem;
      font-weight: 600;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .business-plan {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: none;
      width: 100%;
      margin-top: 8px;
    }

    .logout-btn:hover { color: var(--red); background: rgba(239,68,68,0.08); }

    /* MAIN */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* TOPBAR */
    .topbar {
      padding: 20px 36px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(5,8,16,0.6);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .topbar-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .btn-new-pass {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 20px rgba(59,130,246,0.3);
    }

    .btn-new-pass:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 30px rgba(59,130,246,0.5);
    }

    /* CONTENT */
    .content {
      padding: 36px;
      flex: 1;
    }

    /* STATS GRID */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s;
    }

    .stat-card:hover {
      border-color: rgba(59,130,246,0.2);
      transform: translateY(-2px);
    }

    .stat-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
    }

    .stat-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .stat-icon.blue { background: rgba(59,130,246,0.12); }
    .stat-icon.green { background: rgba(16,185,129,0.12); }
    .stat-icon.gold { background: rgba(245,158,11,0.12); }
    .stat-icon.cyan { background: rgba(6,182,212,0.12); }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }

    .stat-change {
      font-size: 0.75rem;
      color: var(--green);
      margin-top: 4px;
    }

    /* SECTION TITLE */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
    }

    /* PASSES GRID */
    .passes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .pass-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s;
    }

    .pass-card:hover {
      border-color: rgba(59,130,246,0.2);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .pass-preview {
      height: 120px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .pass-preview::before {
      content: '';
      position: absolute;
      top: -20px; right: -20px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }

    .pass-preview-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .pass-preview-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pass-type-badge {
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 100px;
      background: rgba(255,255,255,0.15);
      font-weight: 500;
    }

    .pass-qr-mini {
      font-size: 24px;
      opacity: 0.7;
    }

    .pass-info {
      padding: 16px 20px;
    }

    .pass-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .pass-scans {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .pass-scans strong {
      color: var(--text);
      font-weight: 600;
    }

    .pass-actions {
      display: flex;
      gap: 8px;
    }

    .btn-sm {
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-sm.outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-sm.outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-sm.danger {
      background: rgba(239,68,68,0.1);
      color: var(--red);
    }

    .btn-sm.danger:hover { background: rgba(239,68,68,0.2); }

    .pass-link {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface);
      padding: 6px 10px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .pass-link span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .copy-btn {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: 16px;
    }

    .empty-icon { font-size: 3rem; margin-bottom: 16px; }

    .empty-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .empty-desc {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      position: relative;
      animation: fadeUp 0.3s ease;
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-close {
      position: absolute;
      top: 20px; right: 20px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.3rem;
      cursor: pointer;
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 7px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 11px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.875rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
    }

    .form-group select option { background: var(--card); }

    .color-row {
      display: flex;
      gap: 12px;
    }

    .color-row .form-group { flex: 1; }

    .form-group input[type="color"] {
      padding: 4px;
      height: 44px;
      cursor: pointer;
    }

    .form-submit {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      margin-top: 8px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .form-submit:hover { opacity: 0.9; transform: translateY(-1px); }

    .form-message {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
    }

    .form-message.success {
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.2);
      color: var(--green);
      display: block;
    }

    .form-message.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
      display: block;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 0.875rem;
      z-index: 9999;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">Pass<span>ora</span></div>
  <nav class="sidebar-nav">
    <button class="nav-item active" onclick="showSection('passes')">
      <span class="icon">🎫</span> Mes Passes
    </button>
    <button class="nav-item" onclick="showSection('analytics')">
      <span class="icon">📊</span> Analytics
    </button>
    <button class="nav-item" onclick="showSection('settings')">
      <span class="icon">⚙️</span> Paramètres
    </button>
  </nav>
  <div class="sidebar-bottom">
    <div class="business-info">
      <div class="business-avatar" id="bizAvatar">P</div>
      <div>
        <div class="business-name" id="bizName">Chargement...</div>
        <div class="business-plan">Plan Starter</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">
      <span>🚪</span> Se déconnecter
    </button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-title" id="pageTitle">Mes Passes</div>
    <button class="btn-new-pass" onclick="openCreateModal()">
      <span>+</span> Nouveau Pass
    </button>
  </div>

  <div class="content">
    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-label">Passes actifs</div>
          <div class="stat-icon blue">🎫</div>
        </div>
        <div class="stat-value" id="statPasses">0</div>
        <div class="stat-change">Total créés</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-label">Total scans</div>
          <div class="stat-icon green">📱</div>
        </div>
        <div class="stat-value" id="statScans">0</div>
        <div class="stat-change">Tous les passes</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-label">Distribués</div>
          <div class="stat-icon gold">🔗</div>
        </div>
        <div class="stat-value" id="statLinks">0</div>
        <div class="stat-change">Liens partagés</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-label">Compte créé</div>
          <div class="stat-icon cyan">📅</div>
        </div>
        <div class="stat-value" id="statDate">—</div>
        <div class="stat-change">Date d'inscription</div>
      </div>
    </div>

    <!-- PASSES -->
    <div id="section-passes">
      <div class="section-header">
        <div class="section-title">Tous mes passes</div>
      </div>
      <div class="passes-grid" id="passesGrid">
        <!-- passes chargés dynamiquement -->
      </div>
    </div>
  </div>
</main>

<!-- CREATE PASS MODAL -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <button class="modal-close" onclick="closeCreateModal()">✕</button>
    <div class="modal-title">✨ Créer un nouveau pass</div>

    <div class="form-group">
      <label>Nom du pass</label>
      <input type="text" id="passName" placeholder="Ex: Carte Fidélité Café Oran"/>
    </div>

    <div class="form-group">
      <label>Type de pass</label>
      <select id="passType">
        <option value="loyalty">🏆 Carte de Fidélité</option>
        <option value="coupon">🎟️ Coupon / Réduction</option>
        <option value="ticket">🎫 Billet / Événement</option>
        <option value="membership">💎 Carte Membre</option>
        <option value="generic">📋 Pass Générique</option>
      </select>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea id="passDesc" rows="2" placeholder="Description du pass..."></textarea>
    </div>

    <div class="color-row">
      <div class="form-group">
        <label>Couleur de fond</label>
        <input type="color" id="passBgColor" value="#1e40af"/>
      </div>
      <div class="form-group">
        <label>Couleur du texte</label>
        <input type="color" id="passTextColor" value="#ffffff"/>
      </div>
    </div>

    <button class="form-submit" onclick="createPass()">Créer le pass →</button>
    <div class="form-message" id="create-msg"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:5000/api';
  const token = localStorage.getItem('token');
  const business = JSON.parse(localStorage.getItem('business') || '{}');

  // Vérifier auth
  if (!token) window.location.href = 'index.html';

  // Init
  document.getElementById('bizName').textContent = business.name || 'Mon Business';
  document.getElementById('bizAvatar').textContent = (business.name || 'P')[0].toUpperCase();

  // Date inscription
  const today = new Date();
  document.getElementById('statDate').textContent =
    today.getDate() + '/' + (today.getMonth()+1) + '/' + today.getFullYear();

  // Load passes
  async function loadPasses() {
    try {
      const res = await fetch(`${API}/passes`, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      if (res.ok) {
        renderPasses(data.passes || []);
        document.getElementById('statPasses').textContent = (data.passes || []).length;
        document.getElementById('statLinks').textContent = (data.passes || []).length;
      }
    } catch (err) {
      renderPasses([]);
    }
  }

  function renderPasses(passes) {
    const grid = document.getElementById('passesGrid');
    if (passes.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column: 1/-1">
          <div class="empty-icon">🎫</div>
          <div class="empty-title">Aucun pass encore créé</div>
          <div class="empty-desc">Créez votre premier pass numérique pour vos clients</div>
          <button class="btn-new-pass" onclick="openCreateModal()" style="margin:0 auto">+ Créer mon premier pass</button>
        </div>`;
      return;
    }

    const typeEmojis = {
      loyalty: '🏆', coupon: '🎟️', ticket: '🎫', membership: '💎', generic: '📋'
    };

    const typeLabels = {
      loyalty: 'Fidélité', coupon: 'Coupon', ticket: 'Billet', membership: 'Membre', generic: 'Générique'
    };

    grid.innerHTML = passes.map(pass => `
      <div class="pass-card">
        <div class="pass-preview" style="background: linear-gradient(135deg, ${pass.background_color}, ${pass.background_color}cc)">
          <div class="pass-preview-name" style="color: ${pass.text_color}">
            ${typeEmojis[pass.type] || '📋'} ${pass.name}
          </div>
          <div class="pass-preview-bottom">
            <div class="pass-type-badge" style="color: ${pass.text_color}">${typeLabels[pass.type] || pass.type}</div>
            <div class="pass-qr-mini">▦</div>
          </div>
        </div>
        <div class="pass-info">
          <div class="pass-info-row">
            <div class="pass-scans">Scans: <strong>0</strong></div>
            <div class="pass-actions">
              <button class="btn-sm outline" onclick="copyLink('${pass.unique_link}')">🔗 Partager</button>
              <button class="btn-sm danger" onclick="deletePass(${pass.id})">🗑️</button>
            </div>
          </div>
          <div class="pass-link">
            <span>passora.dz/pass/${pass.unique_link}</span>
            <button class="copy-btn" onclick="copyLink('${pass.unique_link}')">Copier</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function copyLink(link) {
    navigator.clipboard.writeText(`http://localhost:5000/pass/${link}`);
    showToast('🔗 Lien copié !');
  }

  async function deletePass(id) {
    if (!confirm('Supprimer ce pass ?')) return;
    try {
      const res = await fetch(`${API}/passes/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.ok) {
        showToast('✅ Pass supprimé');
        loadPasses();
      }
    } catch (err) {
      showToast('❌ Erreur');
    }
  }

  function openCreateModal() {
    document.getElementById('createModal').classList.add('active');
  }

  function closeCreateModal() {
    document.getElementById('createModal').classList.remove('active');
    document.getElementById('create-msg').className = 'form-message';
  }

  async function createPass() {
    const name = document.getElementById('passName').value.trim();
    const type = document.getElementById('passType').value;
    const description = document.getElementById('passDesc').value;
    const background_color = document.getElementById('passBgColor').value;
    const text_color = document.getElementById('passTextColor').value;
    const msg = document.getElementById('create-msg');

    if (!name) {
      msg.className = 'form-message error';
      msg.textContent = '❌ Le nom du pass est obligatoire';
      return;
    }

    try {
      const res = await fetch(`${API}/passes`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ name, type, description, background_color, text_color })
      });
      const data = await res.json();
      if (res.ok) {
        msg.className = 'form-message success';
        msg.textContent = '✅ Pass créé avec succès !';
        setTimeout(() => {
          closeCreateModal();
          loadPasses();
        }, 1200);
      } else {
        msg.className = 'form-message error';
        msg.textContent = '❌ ' + data.message;
      }
    } catch (err) {
      msg.className = 'form-message error';
      msg.textContent = '❌ Erreur de connexion au serveur';
    }
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('business');
    window.location.href = 'index.html';
  }

  function showSection(section) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    event.target.closest('.nav-item').classList.add('active');
    document.getElementById('pageTitle').textContent =
      section === 'passes' ? 'Mes Passes' :
      section === 'analytics' ? 'Analytics' : 'Paramètres';
  }

  // Close modal on overlay click
  document.getElementById('createModal').addEventListener('click', function(e) {
    if (e.target === this) closeCreateModal();
  });

  // Init
  loadPasses();
</script>
</body>
</html>
